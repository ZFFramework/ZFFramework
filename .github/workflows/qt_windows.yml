name: Qt Windows

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    env:
      ZFCI_TOKEN: ${{secrets.ZFCI_TOKEN}}
      ZF_PROJ_PATH: demo/zfproj
      ZF_PROJ_NAME: ZFFramework_test

    steps:
    - uses: actions/checkout@v3

    - name: Setup Qt
      uses: jurplel/install-qt-action@v3.0.0
      with:
        host: windows
        target: desktop
        modules: qtwebengine

    - name: ZFSetup
      run: |
        .\zfsetup.bat

    - name: ZF build zfproj
      run: |
        ..\ZFFramework\master\ZF_CI\testbuild\testbuild_Qt_Windows.bat "${ZF_PROJ_NAME}" "${ZF_PROJ_PATH}\Qt\${ZF_PROJ_NAME}"

